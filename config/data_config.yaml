# COM3001 Backtesting Framework — Data Configuration
# All data parameters in one place for reproducibility and auditability.

source:
  provider: "wrds_crsp"
  table: "crsp.dsf"
  names_table: "crsp.dsenames"
  description: >
    CRSP Daily Stock File via WRDS. Institutional-grade source with
    split/dividend-adjusted returns and verified OHLCV data.

asset:
  ticker: "SPY"
  permno: 84398
  description: "SPDR S&P 500 ETF Trust — broad US equity market proxy"

period:
  start_date: "2010-01-04"
  end_date: "2024-12-31"

fields:
  - date
  - prc
  - openprc
  - askhi
  - bidlo
  - vol
  - ret

output:
  raw_path: "data/raw/spy_daily_raw.csv"

preprocessing:
  input_path: "data/raw/spy_daily_raw.csv"
  output_path: "data/interim/spy_daily_clean.csv"
  drop_if_null:
    - close
    - return

reproducibility:
  random_seed: 42
  python_version: "3.11.9"

target:
  input_path: "data/interim/spy_daily_clean.csv"
  output_path: "data/processed/spy_targeted.csv"
  type: "binary_direction"
  shift: 1
  description: "1 if next-day return > 0, else 0"

features:
  input_path: "data/processed/spy_targeted.csv"
  output_path: "data/processed/spy_featured.csv"
  description: "14 technical features across 6 categories, time-t-or-earlier only"

splitting:
  input_path: "data/processed/spy_featured.csv"
  train_output_path: "data/processed/spy_train.csv"
  test_output_path: "data/processed/spy_test.csv"
  train_end_date: "2022-12-31"
  description: "Strict chronological split — train up to 2022-12-31, test from first 2023 trading day"

geobm:
  train_path: "data/processed/spy_train.csv"
  test_path: "data/processed/spy_test.csv"
  predictions_path: "results/predictions/geobm_predictions.csv"
  description: "Geometric Brownian Motion directional baseline — analytic one-step-ahead prediction"

genetic:
  train_path: "data/processed/spy_train.csv"
  test_path: "data/processed/spy_test.csv"
  predictions_path: "results/predictions/ga_predictions.csv"
  n_rules: 3
  population_size: 100
  generations: 50
  crossover_prob: 0.7
  mutation_prob: 0.2
  description: "DEAP evolutionary directional baseline — majority-vote threshold rules over engineered features"

xgboost:
  train_path: "data/processed/spy_train.csv"
  test_path: "data/processed/spy_test.csv"
  predictions_path: "results/predictions/xgb_predictions.csv"
  max_depth: 3
  n_estimators: 100
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8
  description: "XGBoost gradient-boosted tree classifier — supervised directional prediction over 14 engineered features"

xgboost_v2:
  train_path: "data/processed/spy_train.csv"
  test_path: "data/processed/spy_test.csv"
  predictions_path: "results/predictions/xgb_v2_predictions.csv"
  validation_end_date: "2020-12-31"
  subsample: 0.8
  colsample_bytree: 0.8
  early_stopping_rounds: 10
  grid_max_depth: [2, 3, 4]
  grid_n_estimators: [50, 100, 200]
  grid_learning_rate: [0.05, 0.1]
  description: "XGBoost-v2 — validated, early-stopped variant with chronological grid search"

evaluation:
  # Evaluates original 3 paradigms. XGBoost-v2 analysed by dedicated modules
  # (xgb_classifier_v2.py, feature_ablation.py, calibration_analysis.py).
  prediction_files:
    - "results/predictions/geobm_predictions.csv"
    - "results/predictions/ga_predictions.csv"
    - "results/predictions/xgb_predictions.csv"
  summary_path: "results/tables/model_comparison.csv"
  description: "Common evaluation harness — side-by-side comparison of all three paradigms"
